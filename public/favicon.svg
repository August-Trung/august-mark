<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- August Mark logo placeholder: stylized "A" with a mark/dot -->
  <rect width="100" height="100" rx="20" fill="#0f1117"/>
  <!-- Letter A shape -->
  <polygon points="50,12 82,88 66,88 58,66 42,66 34,88 18,88" fill="none" stroke="#ff6b35" stroke-width="6" stroke-linejoin="round"/>
  <!-- Crossbar of A -->
  <line x1="40" y1="60" x2="60" y2="60" stroke="#ff6b35" stroke-width="6" stroke-linecap="round"/>
  <!-- Review dot / mark indicator -->
  <circle cx="82" cy="20" r="10" fill="#4ecdc4"/>
</svg>
